<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Hiển thị ảnh ngẫu nhiên</title>
</head>
<body>
  <button onclick="showRandomImage()">Hiển thị ảnh</button>
  <br><br>
  <div id="imageContainer"></div>

  <script>
    function showRandomImage() {
      const images = [
        {
          url: "http://farm4.staticflickr.com/3691/11268502654_f28f05966c_m.jpg",
          width: 240,
          height: 160
        },
        {
          url: "http://farm1.staticflickr.com/33/45336904_1aef569b30_n.jpg",
          width: 320,
          height: 195
        },
        {
          url: "http://farm6.staticflickr.com/5211/5384592886_80a512e2c9.jpg",
          width: 500,
          height: 343
        }
      ];

      const randomIndex = Math.floor(Math.random() * images.length);
      const selected = images[randomIndex];

      const imgTag = `<img src="${selected.url}" width="${selected.width}" height="${selected.height}">`;
      document.getElementById("imageContainer").innerHTML = imgTag;
    }
  </script>
</body>
</html>
