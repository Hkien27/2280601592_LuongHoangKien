<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Change the content of a cell</title>
    <style type="text/css">
      body {
        margin: 30px;
      }
    </style>
  </head>
  <body>
    <table id="myTable" border="1">
    </table>
    <form>
      <input type="button" onclick="createTable(3, 5)" value="Create the table">
    </form>

    <script>
      function createTable(rows, cols) {
        const table = document.getElementById("myTable");
        table.innerHTML = ""; // Xóa bảng cũ nếu có

        for (let i = 0; i < rows; i++) {
          const newRow = table.insertRow();
          for (let j = 0; j < cols; j++) {
            const newCell = newRow.insertCell();
            newCell.innerHTML = `Row ${i + 1} Cell ${j + 1}`;
          }
        }
      }
    </script>
  </body>
</html>
