<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Đổi màu chữ</title>
</head>
<body>
    <p id="text">JavaScript</p>
    <button onclick="js_style()">Thay đổi kiểu</button>

    <script>
        function js_style() {
            document.getElementById("text").style.color = "red";
            document.getElementById("text").style.fontSize = "24px";
        }
    </script>
</body>
</html>
