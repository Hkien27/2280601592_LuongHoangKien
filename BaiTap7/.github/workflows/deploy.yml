name: Deploy static site

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: ./BaiTap7/docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
